- type: entity
  parent: ClothingScarfBase
  id: DogCollar
  name: ошейник
  description: Крепкий ошейник немного сжимающий шею носителя и придушивая его. Кому то такое даже нравится.
  components:
    - type: Sprite
      sprite: _FreakStation/Casha/clothing/neck/ohgod.rsi
    - type: Clothing
      sprite: _FreakStation/Casha/clothing/neck/ohgod.rsi

- type: entity
  parent: ClothingScarfBase
  id: DogCollarElectrical
  name: шоковый ошейник
  description: Крепкий ошейник который выдаёт разряд тока по сигналу, кто то и такое любит.
  components:
    - type: Sprite
      sprite: _FreakStation/Casha/clothing/neck/ohgodd.rsi
    - type: Clothing
      sprite: _FreakStation/Casha/clothing/neck/ohgodd.rsi
      stripDelay: 10
      equipDelay: 5
    - type: SelfUnremovableClothing
    - type: ShockOnTrigger
      damage: 3
      duration: 3
    - type: TriggerOnSignal
    - type: DeviceLinkSink
      ports:
        - Trigger
